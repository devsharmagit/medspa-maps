version: "3.9"

services:
  medspamap-postgres:
    image: postgres:16-alpine
    container_name: medspamap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medspamap
      POSTGRES_PASSWORD: medspamap_password
      POSTGRES_DB: medspamap_db
    ports:
      - "5432:5432"
    volumes:
      - medspamap_postgres_data:/var/lib/postgresql/data

  medspamap-redis:
    image: redis:7-alpine
    container_name: medspamap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - medspamap_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  medspamap_postgres_data:
  medspamap_redis_data: